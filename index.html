<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vasudev Studio | Visual Engine 3.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image-more/3.1.6/dom-to-image-more.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,700;0,800;1,800&display=swap" rel="stylesheet">
    <style>
        :root {
            --p1: #00f0ff; --p2: #8b5cf6; --p3: #020617;
            --p1-glow: rgba(0, 240, 255, 0.2);
            --bg: #020205;
            --aspect: 16/9;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        *::-webkit-scrollbar { display: none; }
        body { background: var(--bg); color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        /* --- STABLE GRID SYSTEM --- */
        .app-shell { display: grid; grid-template-columns: 1fr; width: 100vw; }

        @media (min-width: 1024px) {
            .app-shell { grid-template-columns: 360px 1fr; height: 100vh; overflow: hidden; }
        }

        .sidebar { 
            padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem; 
            background: rgba(255,255,255,0.01); border-right: 1px solid rgba(255,255,255,0.05);
            overflow-y: auto; z-index: 10; width: 100%;
        }

        .workspace { 
            position: relative; display: flex; align-items: center; justify-content: center; 
            padding: 2rem; background: #000; overflow: hidden; width: 100%;
        }

        @media (max-width: 1023px) {
            .workspace { order: -1; min-height: 400px; padding: 1.5rem; }
            .sidebar { padding: 2rem; }
        }

        /* --- UI COMPONENTS --- */
        .glass-card {
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(50px);
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem; padding: 1.5rem;
        }

        .canvas-frame {
            position: relative; 
            width: 100%; height: auto;
            max-width: 100%; max-height: 85vh;
            aspect-ratio: var(--aspect);
            background: #000; border-radius: 2.5rem; overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.9);
            transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex; align-items: center; justify-content: center;
        }

        @media (min-width: 1024px) {
            .canvas-frame { height: 80vh; width: auto; max-width: 100%; }
        }

        @media (max-width: 1023px) {
            .canvas-frame { max-height: 60vh; width: 100%; }
        }

        .mesh-point {
            position: absolute; width: 85%; height: 85%; border-radius: 50%;
            filter: blur(120px); opacity: 0.7; mix-blend-mode: screen;
            transition: background 0.8s, box-shadow 0.8s;
        }

        .slider { -webkit-appearance: none; width: 100%; height: 2px; background: rgba(255,255,255,0.1); border-radius: 2px; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #fff; cursor: pointer; border: 3px solid var(--p1); }

        .pill {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
            padding: 0.6rem 1.25rem; border-radius: 2rem; font-size: 10px; font-weight: 800;
            text-transform: uppercase; color: rgba(255,255,255,0.4); transition: 0.2s;
        }
        .pill.active { background: #fff; color: #000; border-color: #fff; }

        .history-item {
            width: 100%; aspect-ratio: 1/1; border-radius: 0.75rem; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            overflow: hidden;
        }
        .history-item:hover { transform: scale(1.1); border-color: #fff; }

        .toast {
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px);
            background: #fff; color: #000; padding: 0.8rem 2rem; border-radius: 1rem;
            font-size: 11px; font-weight: 900; z-index: 1000;
            transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        .grain-overlay { position: absolute; inset: 0; z-index: 5; pointer-events: none; opacity: 0.15; background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyCAMAAAAp4XiDAAAAUVBMVEUAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAADl9mYvAAAABnRSTlMAmZmpzMxmZswzAAAAZElEQVQ4y2NgYGRiYmJiZGJmYWVjZWNnY+dg52DnYeXj5ePnE+AQEBAUERTkExQUFBYRFRMVExUTFRMVExcXFxcXFxcXFxcXFxcXFxcXFxcXFxcXFxcXFxcXFxcXFxcXFxcXFxcXFwk5Af0GHAAsAAAAAElFTkSuQmCC"); }
    </style>
</head>
<body>

    <div id="toast" class="toast">Update Successful</div>

    <main class="app-shell">
        
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="flex items-center gap-3 mb-4">
                <div id="status-glow" class="w-3 h-3 rounded-full bg-cyan-400 shadow-[0_0_20px_#00f0ff] animate-pulse"></div>
                <h1 class="text-xl font-black italic uppercase tracking-tighter">Vasudev <span class="font-light opacity-30">Studio</span></h1>
            </div>

            <!-- CHROMATIC -->
            <div class="glass-card flex flex-col gap-6">
                <div class="flex justify-between items-center">
                    <span class="text-[10px] text-white/30 uppercase font-black tracking-widest">Chromatic</span>
                    <div class="flex items-center gap-3">
                        <div class="flex items-center gap-3 bg-white/5 rounded-full px-3 py-1 border border-white/5">
                            <button onclick="removePoint()" class="text-white/40 hover:text-white font-bold">-</button>
                            <span id="point-count" class="text-[10px] font-black w-4 text-center">3</span>
                            <button onclick="addPoint()" class="text-white/40 hover:text-white font-bold">+</button>
                        </div>
                        <button onclick="shufflePalette()" class="text-[10px] font-black uppercase text-cyan-400">Shuffle</button>
                    </div>
                </div>
                <div class="flex items-center justify-between">
                    <div class="flex gap-4">
                        <input type="color" id="c1" value="#00f0ff" oninput="updateColors()" class="w-12 h-12 bg-transparent cursor-pointer rounded-full border-0">
                        <input type="color" id="c2" value="#8b5cf6" oninput="updateColors()" class="w-12 h-12 bg-transparent cursor-pointer rounded-full border-0">
                        <input type="color" id="c3" value="#020617" oninput="updateColors()" class="w-12 h-12 bg-transparent cursor-pointer rounded-full border-0">
                    </div>
                </div>
            </div>

            <!-- COMPOSITION -->
            <div class="glass-card flex flex-col gap-6">
                <span class="text-[10px] text-white/30 uppercase font-black tracking-widest">Composition</span>
                <div class="flex flex-col gap-6">
                    <div class="flex flex-col gap-3">
                        <span class="text-[9px] font-bold text-white/20 uppercase tracking-widest">Format</span>
                        <div class="flex gap-2">
                            <button onclick="setRatio('16-9')" class="pill active" id="btn-16-9">Desktop</button>
                            <button onclick="setRatio('9-16')" class="pill" id="btn-9-16">Story</button>
                            <button onclick="setRatio('1-1')" class="pill" id="btn-1-1">Social</button>
                        </div>
                    </div>
                    <div class="flex flex-col gap-3">
                        <span class="text-[9px] font-bold text-white/20 uppercase tracking-widest">Texture</span>
                        <input type="range" id="rg" min="0" max="60" value="15" class="slider" oninput="updatePhysics()">
                    </div>
                    <div class="flex flex-col gap-3">
                        <span class="text-[9px] font-bold text-white/20 uppercase tracking-widest">Overlays</span>
                        <div class="flex gap-2">
                            <button onclick="setPattern('none')" class="pill active" id="p-none">Clean</button>
                            <button onclick="setPattern('dots')" class="pill" id="p-dots">Dots</button>
                            <button onclick="setPattern('grid')" class="pill" id="p-grid">Grid</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- EXPORT -->
            <div class="flex flex-col gap-4">
                <input type="text" id="asset-name" placeholder="studio-master-v3" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-sm font-bold text-white outline-none focus:border-white/20">
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="saveSnapshot()" class="py-5 rounded-2xl border border-white/10 text-[10px] font-black uppercase tracking-widest hover:bg-white/5 transition-all">Save Lab</button>
                    <button onclick="downloadImage()" class="py-5 rounded-2xl bg-white text-black text-[10px] font-black uppercase tracking-widest">Download</button>
                </div>
                <button onclick="copyCSS()" class="text-[9px] uppercase font-bold text-white/20 hover:text-white/50 tracking-widest text-center">Copy CSS Code</button>
            </div>

            <!-- HISTORY -->
            <div id="history-section" class="glass-card flex flex-col gap-4 hidden">
                <span class="text-[10px] text-white/30 uppercase font-black tracking-widest">Recent Labs</span>
                <div id="history-grid" class="grid grid-cols-4 gap-3"></div>
            </div>
        </aside>

        <!-- WORKSPACE -->
        <section class="workspace">
            <div class="canvas-frame" id="canvas-trigger">
                <div class="mesh-container relative w-full h-full bg-black">
                    <div id="m1" class="mesh-point" style="top: 15%; left: 15%;"></div>
                    <div id="m2" class="mesh-point" style="top: 45%; right: 15%;"></div>
                    <div id="m3" class="mesh-point" style="bottom: 15%; left: 25%;"></div>
                    <div class="grain-overlay"></div>
                    <div id="pattern" class="absolute inset-0 z-4 pointer-events-none opacity-0 transition-opacity"></div>
                </div>
            </div>
        </section>

    </main>

    <script>
        const rg = document.getElementById('rg');
        const trigger = document.getElementById('canvas-trigger'), pattern = document.getElementById('pattern');
        const c1 = document.getElementById('c1'), c2 = document.getElementById('c2'), c3 = document.getElementById('c3');
        const toast = document.getElementById('toast');

        let points = [{ id: 'm1', x: 15, y: 15 }, { id: 'm2', x: 75, y: 25 }, { id: 'm3', x: 35, y: 75 }];

        function showToast(msg) {
            toast.innerText = msg; toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function animate() {
            points.forEach((p, i) => {
                const el = document.getElementById(p.id);
                if (el) {
                    el.style.left = `${p.x}%`; el.style.top = `${p.y}%`;
                    const colors = [c1.value, c2.value, c3.value];
                    el.style.background = colors[i % 3];
                    el.style.boxShadow = `0 0 160px ${colors[i % 3]}77`;
                }
            });
        }
        animate();

        window.updateColors = () => {
            document.documentElement.style.setProperty('--p1', c1.value);
            document.documentElement.style.setProperty('--p2', c2.value);
            document.documentElement.style.setProperty('--p3', c3.value);
            const glow = document.getElementById('status-glow');
            if (glow) { glow.style.background = c1.value; glow.style.boxShadow = `0 0 20px ${c1.value}`; }
            animate();
        }

        window.setRatio = (r) => {
            const ratios = { '16-9': '16/9', '9-16': '9/16', '1-1': '1/1' };
            document.documentElement.style.setProperty('--aspect', ratios[r]);
            document.querySelectorAll('[id^="btn-"]').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${r}`).classList.add('active');
            setTimeout(animate, 50); 
        }

        window.addPoint = () => {
            if (points.length >= 10) return;
            const nid = `m${Date.now()}`;
            points.push({ id: nid, x: Math.random()*70 + 15, y: Math.random()*70 + 15 });
            const el = document.createElement('div');
            el.id = nid; el.className = 'mesh-point';
            document.querySelector('.mesh-container').appendChild(el);
            document.getElementById('point-count').innerText = points.length;
            animate();
        }

        window.removePoint = () => {
            if (points.length <= 2) return;
            const p = points.pop();
            const el = document.getElementById(p.id);
            if (el) el.remove();
            document.getElementById('point-count').innerText = points.length;
            animate();
        }

        window.saveSnapshot = () => {
            const state = { 
                c1: c1.value, c2: c2.value, c3: c3.value, rg: rg.value, 
                points: JSON.parse(JSON.stringify(points)), 
                aspect: getComputedStyle(document.documentElement).getPropertyValue('--aspect').trim()
            };
            let history = JSON.parse(localStorage.getItem('v_history_v5') || '[]');
            history.unshift(state); history = history.slice(0, 12);
            localStorage.setItem('v_history_v5', JSON.stringify(history));
            renderHistory(); showToast("Saved");
        }

        window.renderHistory = () => {
            const history = JSON.parse(localStorage.getItem('v_history_v5') || '[]');
            const grid = document.getElementById('history-grid'), section = document.getElementById('history-section');
            if (history.length === 0) { section.classList.add('hidden'); return; }
            section.classList.remove('hidden');
            grid.innerHTML = history.map((s, i) => `<div onclick='loadSnapshot(${i})' class="history-item" style="background: radial-gradient(circle at 50% 50%, ${s.c1}, ${s.c2}, ${s.c3})"></div>`).join('');
        }

        window.loadSnapshot = (idx) => {
            const history = JSON.parse(localStorage.getItem('v_history_v5') || '[]');
            const s = history[idx]; if (!s) return;
            c1.value = s.c1; c2.value = s.c2; c3.value = s.c3; rg.value = s.rg;
            document.documentElement.style.setProperty('--aspect', s.aspect);
            document.querySelectorAll('.mesh-point').forEach(el => el.remove());
            points = JSON.parse(JSON.stringify(s.points));
            points.forEach(p => {
                const el = document.createElement('div'); el.id = p.id; el.className = 'mesh-point';
                document.querySelector('.mesh-container').appendChild(el);
            });
            document.getElementById('point-count').innerText = points.length;
            updateColors(); showToast("Restored");
        }

        window.copyCSS = () => {
            const colors = [c1.value, c2.value, c3.value];
            const gradient = `background-color: ${c3.value};\nbackground-image: \n  ${points.map((p, i) => `radial-gradient(at ${Math.round(p.x)}% ${Math.round(p.y)}%, ${colors[i % 3]} 0px, transparent 50%)`).join(',\n  ')};`;
            navigator.clipboard.writeText(gradient); showToast("CSS Copied");
        }

        window.shufflePalette = () => {
            const randomHex = () => '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
            c1.value = randomHex(); c2.value = randomHex(); updateColors(); showToast("Shuffled");
        }

        window.setPattern = (type) => {
            pattern.className = `absolute inset-0 z-4 pointer-events-none transition-opacity opacity-100`;
            if (type === 'none') pattern.classList.add('opacity-0');
            if (type === 'dots') pattern.style.backgroundImage = 'radial-gradient(rgba(255,255,255,0.1) 1.5px, transparent 1.5px)';
            if (type === 'grid') pattern.style.backgroundImage = 'linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px)';
            pattern.style.backgroundSize = '32px 32px';
            document.querySelectorAll('[id^="p-"]').forEach(b => b.classList.remove('active'));
            document.getElementById(`p-${type}`).classList.add('active');
        }

        window.downloadImage = function() {
            const name = document.getElementById('asset-name').value || 'studio-export';
            domtoimage.toPng(trigger, {
                width: trigger.offsetWidth * 4, height: trigger.offsetHeight * 4,
                style: { transform: `scale(4)`, transformOrigin: 'top left', width: `${trigger.offsetWidth}px`, height: `${trigger.offsetHeight}px` }
            }).then(url => { const link = document.createElement('a'); link.download = `${name}.png`; link.href = url; link.click(); showToast("Exporting PNG"); });
        }

        window.updatePhysics = () => { document.documentElement.style.setProperty('--grain-opacity', rg.value/100); }
        window.resetLab = () => { c1.value = '#00f0ff'; c2.value = '#8b5cf6'; c3.value = '#020617'; rg.value = 15; updatePhysics(); setPattern('none'); setRatio('16-9'); updateColors(); showToast("Reset"); }

        updateColors(); renderHistory();
    </script>
</body>
</html>
